<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Control Panel</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header><h1>⛏ Minecraft Control Panel</h1></header>
<div class="container">
<div class="card"><h2>Статус сервера</h2><p class="online">🟢 Онлайн</p></div>
<div class="card"><h2>Игроки</h2><p>24 / 100</p></div>
<div class="card"><h2>RAM</h2><p>4.2 GB / 8 GB</p></div>
<div class="buttons">
<button class="start">▶ Запустить</button>
<button class="stop">⏹ Остановить</button>
<button class="restart">🔄 Перезапуск</button>
</div>
<div class="console"><h2>Консоль</h2><textarea placeholder="Серверная консоль..."></textarea></div>
</div>
<script src="js/app.js"></script>
</body>
</html>
